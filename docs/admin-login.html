<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Crecer Librería</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --beige:#F2EFDF;--beige-warm:#EAE6CC;--beige-mid:#DDD8B8;
  --moss:#736002;--moss-mid:#8A7302;
  --gold:#D9BA1E;--gold-light:#E3C83A;
  --white:#F8F5E6;--text:#3A3001;--text-mid:#736002;--text-light:#9A8430;
  --border:rgba(115,96,2,0.14);--border-gold:rgba(217,186,30,0.3);
  --red:#C0392B;
}
html,body{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--moss);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

/* Subtle background texture */
body::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(217,186,30,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 20%, rgba(217,186,30,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(138,115,2,0.4) 0%, transparent 70%);
  pointer-events:none;
}

/* Decorative cross top-left */
body::after{
  content:'';
  position:absolute;top:48px;left:48px;
  width:40px;height:40px;
  opacity:0.08;
}

.bg-cross{
  position:absolute;
  opacity:0.06;
}
.bg-cross-1{top:48px;left:48px;width:48px;height:48px;}
.bg-cross-2{bottom:48px;right:48px;width:32px;height:32px;}
.bg-cross::before,.bg-cross::after{
  content:'';position:absolute;background:var(--gold);
}
.bg-cross::before{width:1.5px;height:100%;left:50%;transform:translateX(-50%)}
.bg-cross::after{width:100%;height:1.5px;top:50%;transform:translateY(-50%)}

/* Card */
.login-card{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  background:var(--white);
  border-radius:3px;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,0.35);
  animation:cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

/* Card top bar */
.card-top{
  background:var(--moss);
  padding:32px 40px 28px;
  text-align:center;
  position:relative;
}
.card-top::after{
  content:'';
  position:absolute;bottom:0;left:40px;right:40px;height:1px;
  background:linear-gradient(to right,transparent,rgba(217,186,30,0.3),transparent);
}
.logo-mark{
  width:36px;height:36px;position:relative;
  margin:0 auto 16px;
}
.logo-mark::before,.logo-mark::after{
  content:'';position:absolute;background:var(--gold);
}
.logo-mark::before{width:1.5px;height:100%;left:50%;transform:translateX(-50%)}
.logo-mark::after{width:100%;height:1.5px;top:50%;transform:translateY(-50%)}
.card-brand{
  font-family:'EB Garamond',serif;
  font-size:20px;font-weight:400;color:white;
  letter-spacing:0.02em;display:block;margin-bottom:4px;
}
.card-sub{
  font-size:9px;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--gold);
}

/* Form area */
.card-body{padding:36px 40px 40px}

.form-title{
  font-family:'EB Garamond',serif;
  font-size:22px;font-weight:400;color:var(--moss);
  margin-bottom:6px;
}
.form-hint{
  font-size:12px;color:var(--text-light);
  margin-bottom:28px;font-weight:300;
}

.form-group{
  display:flex;flex-direction:column;gap:5px;
  margin-bottom:16px;
}
.form-label{
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--text-light);
}
.input-wrap{position:relative}
.form-input{
  width:100%;padding:11px 40px 11px 14px;
  border:1px solid var(--border);border-radius:2px;
  font-family:'DM Sans',sans-serif;font-size:14px;
  color:var(--text);background:var(--beige);
  outline:none;transition:border-color 0.22s,background 0.22s,box-shadow 0.22s;
}
.form-input:focus{
  border-color:var(--gold);
  background:var(--white);
  box-shadow:0 0 0 3px rgba(217,186,30,0.1);
}
.form-input.error{border-color:var(--red)}
.form-input::placeholder{color:var(--text-light)}
.input-icon{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--text-light);pointer-events:none;
}
.input-icon svg{width:16px;height:16px}

/* Password toggle */
.toggle-pw{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--text-light);padding:0;
  display:flex;align-items:center;
  transition:color 0.2s;
}
.toggle-pw:hover{color:var(--moss)}
.toggle-pw svg{width:16px;height:16px}

.form-error{
  font-size:11px;color:var(--red);
  margin-top:2px;display:none;
}
.form-error.show{display:block}

/* Remember + forgot */
.form-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
}
.remember{
  display:flex;align-items:center;gap:8px;
  cursor:pointer;user-select:none;
}
.remember input{display:none}
.remember-box{
  width:16px;height:16px;border-radius:1px;
  border:1px solid var(--border);background:var(--beige);
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,border-color 0.15s;flex-shrink:0;
}
.remember input:checked + .remember-box{
  background:var(--moss);border-color:var(--moss);
}
.remember input:checked + .remember-box::after{
  content:'';width:8px;height:5px;
  border-left:1.5px solid white;border-bottom:1.5px solid white;
  transform:rotate(-45deg) translateY(-1px);
  display:block;
}
.remember-label{font-size:12px;color:var(--text-light)}
.forgot{
  font-size:12px;color:var(--gold);text-decoration:none;
  transition:opacity 0.2s;
}
.forgot:hover{opacity:0.7}

/* Submit button */
.btn-login{
  width:100%;padding:13px;
  background:var(--moss);color:white;border:none;border-radius:2px;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background 0.22s,transform 0.15s;
  position:relative;overflow:hidden;
}
.btn-login:hover{background:var(--moss-mid);transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}
.btn-login svg{width:15px;height:15px}
.btn-login.loading{pointer-events:none;opacity:0.7}

/* Error banner */
.error-banner{
  background:rgba(192,57,43,0.08);
  border:1px solid rgba(192,57,43,0.2);
  border-radius:2px;padding:10px 14px;
  font-size:12px;color:var(--red);
  margin-bottom:20px;
  display:none;align-items:center;gap:8px;
}
.error-banner.show{display:flex}
.error-banner svg{width:14px;height:14px;flex-shrink:0}

/* Divider */
.card-footer-note{
  text-align:center;
  margin-top:24px;
  font-size:11px;color:var(--text-light);
  display:flex;align-items:center;gap:8px;justify-content:center;
}
.card-footer-note::before,.card-footer-note::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* Back link */
.back-link{
  position:absolute;top:28px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,0.3);text-decoration:none;
  letter-spacing:0.08em;
  display:flex;align-items:center;gap:6px;
  transition:color 0.2s;
  white-space:nowrap;
}
.back-link:hover{color:rgba(255,255,255,0.6)}
.back-link svg{width:12px;height:12px}

/* Success overlay */
.success-overlay{
  position:absolute;inset:0;z-index:10;
  background:var(--white);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:40px;text-align:center;
}
.success-overlay.show{display:flex}
.success-cross{
  width:48px;height:48px;position:relative;margin-bottom:8px;
}
.success-cross::before,.success-cross::after{
  content:'';position:absolute;background:var(--gold);border-radius:1px;
}
.success-cross::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
.success-cross::after{width:100%;height:2px;top:50%;transform:translateY(-50%)}
.success-title{
  font-family:'EB Garamond',serif;
  font-size:24px;font-weight:400;color:var(--moss);
}
.success-sub{font-size:13px;color:var(--text-light);font-weight:300}
</style>
</head>
<body>

<div class="bg-cross bg-cross-1"></div>
<div class="bg-cross bg-cross-2"></div>

<a href="index.html" class="back-link">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  Volver al sitio
</a>

<div class="login-card">

  <!-- Success state -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-cross"></div>
    <p class="success-title">Bienvenido</p>
    <p class="success-sub">Acceso verificado. Redirigiendo al panel...</p>
  </div>

  <!-- Header -->
  <div class="card-top">
    <div class="logo-mark"></div>
    <span class="card-brand">Crecer Librería</span>
    <span class="card-sub">Panel de Administración</span>
  </div>

  <!-- Form -->
  <div class="card-body">
    <h1 class="form-title">Ingresar</h1>
    <p class="form-hint">Acceso restringido al equipo interno</p>

    <div class="error-banner" id="errorBanner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Correo o contraseña incorrectos
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Correo electrónico</label>
      <div class="input-wrap">
        <input class="form-input" type="email" id="email" placeholder="admin@crecerlibreria.cl" autocomplete="email">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
      </div>
      <span class="form-error" id="emailError">Ingresa un correo válido</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <div class="input-wrap">
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pw" id="togglePw" type="button" aria-label="Mostrar contraseña">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="form-error" id="pwError">La contraseña es requerida</span>
    </div>

    <div class="form-meta">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span class="remember-box"></span>
        <span class="remember-label">Recordarme</span>
      </label>
      <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn-login" id="btnLogin" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Ingresar
    </button>

    <p class="card-footer-note">Acceso seguro · SSL</p>
  </div>

</div>

<script>
const emailInput = document.getElementById('email');
const pwInput    = document.getElementById('password');
const btnLogin   = document.getElementById('btnLogin');
const errorBanner = document.getElementById('errorBanner');

// Password visibility toggle
document.getElementById('togglePw').addEventListener('click', () => {
  const isText = pwInput.type === 'text';
  pwInput.type = isText ? 'password' : 'text';
  document.getElementById('eyeIcon').innerHTML = isText
    ? `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
    : `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
});

// Clear errors on input
[emailInput, pwInput].forEach(el => {
  el.addEventListener('input', () => {
    el.classList.remove('error');
    errorBanner.classList.remove('show');
  });
});

// Submit
btnLogin.addEventListener('click', () => {
  let valid = true;

  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRe.test(emailInput.value.trim())) {
    emailInput.classList.add('error');
    document.getElementById('emailError').classList.add('show');
    valid = false;
  } else {
    emailInput.classList.remove('error');
    document.getElementById('emailError').classList.remove('show');
  }

  if (!pwInput.value.trim()) {
    pwInput.classList.add('error');
    document.getElementById('pwError').classList.add('show');
    valid = false;
  } else {
    pwInput.classList.remove('error');
    document.getElementById('pwError').classList.remove('show');
  }

  if (!valid) return;

  // Simulate auth
  btnLogin.classList.add('loading');
  btnLogin.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" style="animation:spin 1s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Verificando...`;

  setTimeout(() => {
    // Demo: accept any valid-format credentials
    document.getElementById('successOverlay').classList.add('show');
    setTimeout(() => {
      // In production: redirect to admin dashboard
      // window.location.href = 'admin-dashboard.html';
    }, 1800);
  }, 1200);
});

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') btnLogin.click();
});
</script>

<style>
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
</style>
</body>
</html>

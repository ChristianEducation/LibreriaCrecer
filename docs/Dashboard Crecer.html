/* animated counter */
function Counter({ target, prefix="", suffix="" }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (target === 0) { setVal(0); return; }
    let start = null;
    const dur = 800;
    const step = ts => {
      if (!start) start = ts;
      const prog = Math.min((ts - start) / dur, 1);
      const ease = 1 - Math.pow(1 - prog, 3);
      setVal(Math.round(ease * target));
      if (prog < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target]);
  return <>{prefix}{typeof target === "string" ? target : val.toLocaleString("es-CL")}{suffix}</>;
}

      {/* accent strip */}
      <div style={{
        position:"absolute",top:0,left:0,right:0,height:3,
        background:`linear-gradient(90deg,${accent},transparent)`
      }} />
      <div style={{
        width:38,height:38,borderRadius:10,
        background: accent.replace("oklch","oklch").replace(")","/0.12)").replace("oklch(","oklch("),
        display:"flex",alignItems:"center",justifyContent:"center",marginBottom:14
      }}>

      </div>
      <div style={{fontSize:11,fontWeight:600,letterSpacing:.5,color:"#8a8580",marginBottom:8}}>
        {label.toUpperCase()}
      </div>
      <div style={{fontSize:28,fontWeight:700,letterSpacing:-.8,color:"#1a1814",lineHeight:1}}>
        <Counter target={value} prefix={prefix||""} />
      </div>
      {sub && (
        <div style={{fontSize:12,color:subColor||"#8a8580",marginTop:6,fontWeight:500,display:"flex",alignItems:"center",gap:4}}>

            <KpiCard icon="money"    label="Ventas del día"      value={0}  prefix="$" sub="0 pagos hoy"        subColor="#c0998a" accent="oklch(0.68 0.14 70)"  delay={0}  />
            <KpiCard icon="clock"    label="Pedidos pendientes"  value={13}            sub="13 requieren atención" subColor="oklch(0.62 0.16 55)" accent="oklch(0.68 0.16 55)" delay={60} />
            <KpiCard icon="calendar" label="Pedidos del mes"     value={19}            sub="19 acumulados"       subColor="oklch(0.52 0.15 145)" accent="oklch(0.52 0.18 145)" delay={120}/>
            <KpiCard icon="check"    label="Pedidos cerrados"    value={0}             sub="0 entregados"        subColor="#a0998f"  accent="oklch(0.5 0.1 280)"  delay={180}/>
          </div>

          {/* Main grid */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:18,alignItems:"start"}}>

            {/* Left col */}
            <div style={{display:"flex",flexDirection:"column",gap:18}}>

              {/* Order states */}
              <div style={{
                background:"white",borderRadius:16,border:"1px solid #ede9e2",
                padding:"22px 24px",boxShadow:"0 2px 12px rgba(0,0,0,.04)",
                animation:"fadeUp .4s ease 80ms both"
              }}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                  <div>
                    <h2 style={{fontSize:15,fontWeight:600,color:"#1a1814"}}>Estado de pedidos</h2>
                    <p style={{fontSize:12,color:"#a0998f",marginTop:2}}>Vista operacional del flujo actual</p>
                  </div>
                  <button style={{
                    fontSize:12,fontWeight:600,color:"oklch(0.52 0.15 60)",
                    background:"oklch(0.96 0.04 75)",border:"1px solid oklch(0.88 0.07 75)",
                    padding:"6px 14px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                    transition:"all .15s"
                  }}
                  onMouseEnter={e=>{e.currentTarget.style.background="oklch(0.93 0.06 75)";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="oklch(0.96 0.04 75)";}}
                  >Ver todos →</button>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 32px"}}>
                  {ORDER_STATES.map((s,i)=>(
                    <OrderRow key={s.key} state={s} total={totalOrders} delay={i*60} />
                  ))}
                </div>
              </div>

              {/* Activity feed */}
              <div style={{
                background:"white",borderRadius:16,border:"1px solid #ede9e2",
                padding:"22px 24px",boxShadow:"0 2px 12px rgba(0,0,0,.04)",
                animation:"fadeUp .4s ease 160ms both"
              }}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                  <div>
                    <h2 style={{fontSize:15,fontWeight:600,color:"#1a1814"}}>Actividad reciente</h2>
                    <p style={{fontSize:12,color:"#a0998f",marginTop:2}}>Últimos eventos del sistema</p>
                  </div>
                  <button style={{
                    fontSize:12,fontWeight:600,color:"oklch(0.52 0.15 60)",
                    background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"
                  }}>
                    <Ico d={I.refresh} stroke="oklch(0.6 0.12 70)" size={15} />
                  </button>
                </div>
                {ACTIVITY.map((a,i)=>(
                  <ActivityRow key={i} item={a} delay={i*50} />
                ))}
              </div>

            </div>

            {/* Right col — quick links */}
            <div style={{
              background:"white",borderRadius:16,border:"1px solid #ede9e2",
              padding:"22px 24px",boxShadow:"0 2px 12px rgba(0,0,0,.04)",
              animation:"fadeUp .4s ease 120ms both"
            }}>
              <h2 style={{fontSize:15,fontWeight:600,color:"#1a1814",marginBottom:3}}>Accesos rápidos</h2>
              <p style={{fontSize:12,color:"#a0998f",marginBottom:18}}>Atajos a las secciones principales del panel</p>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {QUICK_LINKS.map((item,i)=>(
                  <QuickLink key={i} item={item} onClick={()=>setActiveNav(item.id)} />
                ))}
              </div>

              {/* Divider + tip */}
              <div style={{marginTop:22,padding:"16px",borderRadius:12,background:"oklch(0.97 0.03 75)",border:"1px solid oklch(0.9 0.06 75)"}}>
                <div style={{fontSize:11.5,fontWeight:600,color:"oklch(0.48 0.12 60)",marginBottom:4}}>💡 Consejo</div>
                <div style={{fontSize:12,color:"oklch(0.5 0.08 60)",lineHeight:1.6}}>
                  Hay <strong>13 pedidos pendientes</strong> que requieren revisión. Revísalos antes de fin del día.
                </div>
                <button style={{
                  marginTop:10,fontSize:12,fontWeight:600,
                  color:"oklch(0.48 0.14 58)",background:"none",
                  border:"none",cursor:"pointer",padding:0,fontFamily:"inherit",
                  display:"flex",alignItems:"center",gap:4
                }}>
                  Ver pedidos activos <Ico d={I.arrow} stroke="oklch(0.52 0.14 58)" size={13} />
                </button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
